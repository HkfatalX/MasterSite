<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterFlix - Filmes e Séries</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23141414'/%3E%3Cpath d='M20 78 L20 22 L35 22 L50 55 L65 22 L80 22 L80 78 L68 78 L68 42 L56 68 L44 68 L32 42 L32 78 Z' fill='%23e50914'/%3E%3C/svg%3E">
    <meta name="theme-color" content="#e50914">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --primary-color: #e50914;
            --primary-hover: #f40612;
            --primary-glow: rgba(229, 9, 20, 0.35);
            --bg-color: #0a0a0a;
            --bg-secondary: #141414;
            --card-bg: #1a1a1a;
            --modal-bg: #181818;
            --text-color: #ffffff;
            --text-muted: #8c8c8c;
            --border-color: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(20, 20, 20, 0.85);
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --shadow-card: 0 8px 32px rgba(0,0,0,0.6);
            --shadow-modal: 0 25px 80px rgba(0,0,0,0.9);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        *:focus-visible {
            outline: 3px solid var(--primary-color) !important;
            outline-offset: 3px !important;
            z-index: 100;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            width: 100%;
            font-size: 14px;
            touch-action: manipulation;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
        }

        body.modal-open { overflow: hidden; }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

        /* ========== HEADER ========== */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 68px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 60%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
            transition: all var(--transition-smooth);
        }

        header.scrolled {
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border-color);
            height: 60px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        .menu-toggle-btn {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 5px;
            padding: 11px 10px;
            transition: all var(--transition-fast);
        }

        .menu-toggle-btn:hover,
        .menu-toggle-btn:focus {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .menu-toggle-btn .bar {
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .menu-toggle-btn.active .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-toggle-btn.active .bar:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .menu-toggle-btn.active .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .brand {
            font-size: 22px;
            font-weight: 900;
            color: var(--primary-color);
            cursor: pointer;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.5px;
            transition: all var(--transition-fast);
        }

        .brand:hover { opacity: 0.85; transform: scale(0.98); }
        .brand-logo { width: 28px; height: 28px; }
        .nav-actions { display: flex; align-items: center; gap: 10px; }

        /* ========== SEARCH ========== */
        .search-wrapper { position: relative; display: flex; align-items: center; }

        .search-box {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.06);
            border: 1.5px solid transparent;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            width: 42px;
            height: 42px;
        }

        .search-box.active {
            width: 320px;
            max-width: calc(100vw - 140px);
            border-color: rgba(255,255,255,0.25);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .search-box.active:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--primary-glow), 0 4px 30px rgba(0,0,0,0.5);
        }

        .search-icon-btn {
            min-width: 42px;
            height: 42px;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            font-size: 17px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .search-icon-btn:hover { transform: scale(1.1); }

        .search-input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 0 4px;
            font-size: 14px;
            font-weight: 500;
            width: 0;
            opacity: 0;
            outline: none;
            transition: opacity 0.3s ease;
        }

        .search-box.active .search-input-field { width: auto; opacity: 1; }

        .search-clear-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #999;
            cursor: pointer;
            padding: 0;
            font-size: 11px;
            display: none;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            margin-right: 8px;
            transition: all var(--transition-fast);
        }

        .search-clear-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .search-box.active.has-text .search-clear-btn { display: flex; align-items: center; justify-content: center; }

        .search-results-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            width: 420px;
            max-width: calc(100vw - 24px);
            max-height: 480px;
            overflow-y: auto;
            background: rgba(18,18,18,0.98);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-md);
            display: none;
            z-index: 200;
            box-shadow: var(--shadow-modal);
            animation: dropdownIn 0.25s ease;
        }

        @keyframes dropdownIn {
            from { opacity: 0; transform: translateY(-8px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .search-results-dropdown.visible { display: block; }

        .search-results-header {
            padding: 14px 16px 10px;
            font-size: 10px;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: all var(--transition-fast);
        }

        .search-result-item:hover,
        .search-result-item:focus { background: rgba(229,9,20,0.1); }
        .search-result-item:last-child { border-bottom: none; }

        .search-result-thumb {
            width: 48px;
            height: 68px;
            border-radius: 6px;
            object-fit: cover;
            background: #222;
            flex-shrink: 0;
        }

        .search-result-info { flex: 1; min-width: 0; }
        .search-result-title { font-size: 14px; font-weight: 700; line-height: 1.3; }
        .search-result-title mark { background: transparent; color: var(--primary-color); font-weight: 900; }

        .search-result-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-result-meta .type-badge {
            background: rgba(229,9,20,0.15);
            color: var(--primary-color);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 9px;
            text-transform: uppercase;
        }

        .search-no-results {
            padding: 40px 20px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .search-no-results .search-empty-icon {
            font-size: 36px;
            margin-bottom: 10px;
            display: block;
        }

        /* ========== AVATAR ========== */
        .user-avatar-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            overflow: hidden;
            border: 2.5px solid rgba(255,255,255,0.15);
            transition: all var(--transition-fast);
        }

        .user-avatar-btn:hover,
        .user-avatar-btn:focus {
            border-color: var(--primary-color);
            transform: scale(1.08);
            box-shadow: 0 0 0 4px var(--primary-glow);
        }

        .user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* ========== SIDEBAR ========== */
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            z-index: 998;
            opacity: 0;
            visibility: hidden;
            transition: all var(--transition-smooth);
        }

        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .sidebar-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 290px;
            max-width: 85vw;
            height: 100vh;
            height: 100dvh;
            background: linear-gradient(180deg, #161616 0%, #0a0a0a 100%);
            border-right: 1px solid var(--border-color);
            z-index: 999;
            transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-menu.active { transform: translateX(0); }

        .sidebar-header {
            padding: 22px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 900;
            color: var(--primary-color);
            letter-spacing: -0.3px;
        }

        .sidebar-brand svg { width: 30px; height: 30px; }

        .sidebar-close-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            color: #999;
            font-size: 18px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .sidebar-close-btn:hover { background: var(--primary-color); color: #fff; }

        .sidebar-user {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.02);
        }

        .sidebar-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 18px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .sidebar-user-info { flex: 1; min-width: 0; }

        .sidebar-user-name {
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-user-email {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .sidebar-nav { flex: 1; padding: 14px 0; overflow-y: auto; }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 13px 22px;
            cursor: pointer;
            color: #ccc;
            font-size: 14px;
            font-weight: 600;
            border-left: 3px solid transparent;
            transition: all var(--transition-fast);
            position: relative;
        }

        .sidebar-item:hover,
        .sidebar-item:focus {
            background: rgba(229, 9, 20, 0.08);
            color: #fff;
            border-left-color: var(--primary-color);
        }

        .sidebar-item.active {
            background: rgba(229, 9, 20, 0.12);
            color: #fff;
            border-left-color: var(--primary-color);
        }

        .sidebar-item .icon { font-size: 18px; width: 26px; text-align: center; }
        .sidebar-divider { height: 1px; background: var(--border-color); margin: 8px 22px; }

        .sidebar-footer {
            padding: 18px 22px;
            border-top: 1px solid var(--border-color);
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 0.3px;
        }

        /* ========== APP CONTAINER ========== */
        .app-container { padding-top: 78px; padding-bottom: 60px; }

        /* ========== HERO ========== */
        .hero-banner {
            position: relative;
            width: 96%;
            max-width: 1680px;
            margin: 0 auto 36px auto;
            min-height: 480px;
            height: 58vh;
            max-height: 680px;
            border-radius: var(--radius-xl);
            overflow: hidden;
            background: var(--card-bg);
        }

        .hero-backdrop {
            position: absolute;
            inset: 0;
            background-position: center top;
            background-size: cover;
            transition: background-image 0.6s ease;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(10,10,10,0.15) 0%, rgba(10,10,10,0.4) 50%, rgba(10,10,10,0.92) 85%, var(--bg-color) 100%);
        }

        .hero-side-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, rgba(10,10,10,0.7) 0%, transparent 50%);
        }

        .hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 36px;
            z-index: 3;
            max-width: 700px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--primary-color), #ff4444);
            font-size: 10px;
            font-weight: 800;
            padding: 6px 14px;
            border-radius: 6px;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-title {
            font-size: clamp(28px, 5.5vw, 56px);
            font-weight: 900;
            margin-bottom: 12px;
            line-height: 1.05;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.95);
        }

        .hero-meta {
            display: flex;
            gap: 10px;
            font-size: 13px;
            color: #bbb;
            margin-bottom: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .hero-meta .dot { color: var(--primary-color); font-weight: 800; }

        .hero-desc {
            max-width: 620px;
            color: #d0d0d0;
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 22px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }

        /* ========== CATEGORIES ========== */
        .categories-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 2% 22px 2%;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .categories-bar::-webkit-scrollbar { display: none; }

        .category-chip {
            padding: 10px 20px;
            border-radius: 24px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid rgba(255,255,255,0.08);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            scroll-snap-align: start;
            transition: all var(--transition-fast);
        }

        .category-chip:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        .category-chip.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        /* ========== SECTIONS ========== */
        .section-row { margin-bottom: 44px; padding-left: 2%; }

        .section-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: -0.3px;
        }

        .carousel-container {
            display: flex;
            gap: 14px;
            overflow-x: auto;
            padding: 12px 2% 16px 0;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .carousel-container::-webkit-scrollbar { display: none; }

        /* ========== MEDIA CARD ========== */
        .media-card {
            flex: 0 0 152px;
            height: 225px;
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            background: var(--card-bg);
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.04);
            transition: all var(--transition-smooth);
            scroll-snap-align: start;
        }

        .media-card:hover,
        .media-card:focus {
            transform: scale(1.08);
            z-index: 10;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            border-color: rgba(229,9,20,0.5);
        }

        .media-card:hover .media-card-overlay { opacity: 1; }

        .media-card-poster {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .media-card:hover .media-card-poster { transform: scale(1.05); }

        .media-card-poster-fallback {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .media-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 40%, rgba(0,0,0,0.98) 100%);
            padding: 14px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            opacity: 0.85;
            transition: opacity var(--transition-fast);
        }

        .media-card-title {
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .media-card-tag {
            font-size: 9px;
            font-weight: 800;
            color: var(--primary-color);
            text-transform: uppercase;
            margin-bottom: 3px;
            letter-spacing: 0.5px;
        }

        /* ========== CONTINUE WATCHING ========== */
        .continue-card {
            flex: 0 0 260px;
            height: 155px;
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            background: var(--card-bg);
            cursor: pointer;
            border: 1.5px solid rgba(255,255,255,0.06);
            transition: all var(--transition-smooth);
            scroll-snap-align: start;
        }

        .continue-card:hover,
        .continue-card:focus {
            transform: scale(1.04);
            z-index: 10;
            border-color: rgba(255,202,40,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .continue-card img { width: 100%; height: 100%; object-fit: cover; }

        .continue-info {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 15%, rgba(0,0,0,0.97) 100%);
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .continue-duration {
            font-size: 10px;
            color: #ffca28;
            font-weight: 700;
            margin-top: 3px;
        }

        .continue-remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            cursor: pointer;
            opacity: 0;
            transition: opacity var(--transition-fast);
            z-index: 6;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .continue-card:hover .continue-remove-btn { opacity: 1; }

        .continue-ep-badge {
            font-size: 9px;
            font-weight: 800;
            color: var(--primary-color);
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .continue-play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(229,9,20,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            opacity: 0;
            transition: all var(--transition-fast);
        }

        .continue-card:hover .continue-play-icon { opacity: 1; }

        /* ========== BUTTONS ========== */
        .btn-primary {
            padding: 13px 28px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary-color), #c50710);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all var(--transition-fast);
            box-shadow: 0 4px 16px var(--primary-glow);
        }

        .btn-primary:hover,
        .btn-primary:focus {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--primary-glow);
        }

        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-outline {
            padding: 13px 28px;
            border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-outline:hover,
        .btn-outline:focus {
            background: rgba(255,255,255,0.15);
            border-color: rgba(255,255,255,0.5);
        }

        .btn-secondary {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-secondary:hover { background: rgba(255,255,255,0.12); }

        .btn-danger {
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #c62828;
            background: rgba(198,40,40,0.15);
            color: #ff5252;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .btn-danger:hover { background: rgba(198,40,40,0.3); }

        /* ========== FORMS ========== */
        .file-upload-box {
            border: 2px dashed rgba(255,255,255,0.15);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
            margin-top: 6px;
            transition: all var(--transition-fast);
        }

        .file-upload-box:hover {
            border-color: var(--primary-color);
            background: rgba(229,9,20,0.05);
        }

        .file-upload-label { font-size: 11px; font-weight: 700; color: #aaa; }

        .file-preview-img {
            width: 100%;
            max-height: 160px;
            object-fit: contain;
            background: #000;
            border-radius: 6px;
            margin-top: 8px;
        }

        .input-group { margin-bottom: 16px; text-align: left; }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid #2a2a2a;
            background: #0f0f0f;
            color: #fff;
            font-size: 14px;
            transition: all var(--transition-fast);
        }

        .input-group input:focus,
        .input-group select:focus,
        .input-group textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--primary-glow);
            outline: none;
        }

        .genre-selector-container {
            background: #0f0f0f;
            border: 1.5px solid #2a2a2a;
            border-radius: var(--radius-sm);
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 160px;
            overflow-y: auto;
        }

        .genre-tag {
            padding: 7px 16px;
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            color: #ccc;
            transition: all var(--transition-fast);
        }

        .genre-tag:hover { border-color: var(--primary-color); }

        .genre-tag.selected {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
        }

        .genre-tag.selected::before { content: "✓ "; }

        .genre-counter {
            font-size: 10px;
            color: var(--primary-color);
            margin-top: 6px;
            font-weight: 700;
        }

        /* ========== MODALS ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(16px) saturate(150%);
            -webkit-backdrop-filter: blur(16px) saturate(150%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 12px;
            overflow-y: auto;
        }

        .modal-body {
            background: var(--modal-bg);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 580px;
            max-height: 92vh;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 24px;
            position: relative;
            margin: auto;
            box-shadow: var(--shadow-modal);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(15px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
        }

        .modal-close:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        /* ========== DETAILS MODAL ========== */
        .details-modal-body { padding: 0; overflow: hidden; max-width: 720px; }

        .details-backdrop-area {
            position: relative;
            width: 100%;
            height: 280px;
            background: #0f0f0f center/cover;
        }

        .details-backdrop-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, var(--modal-bg) 100%);
        }

        .details-content-area {
            padding: 0 24px 24px 24px;
            margin-top: -70px;
            position: relative;
            z-index: 2;
            max-height: 55vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .details-poster-inline {
            width: 115px;
            height: 170px;
            border-radius: var(--radius-md);
            object-fit: cover;
            border: 3px solid var(--modal-bg);
            background: #0a0a0a;
            display: block;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }

        /* ========== SEASONS & EPISODES ========== */
        .season-tab-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 18px;
            padding: 4px 0 8px 0;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .season-tab-container::-webkit-scrollbar { display: none; }

        .season-tab {
            padding: 10px 20px;
            border-radius: 24px;
            background: #1e1e1e;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            border: 1.5px solid #333;
            scroll-snap-align: start;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }

        .season-tab:hover { border-color: var(--primary-color); }
        .season-tab.active { background: var(--primary-color); border-color: var(--primary-color); }

        .episodes-scroll-area {
            max-height: 45vh;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .episodes-scroll-area::-webkit-scrollbar { width: 4px; }
        .episodes-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

        .episode-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255,255,255,0.03);
            padding: 14px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-bottom: 8px;
            border: 1.5px solid rgba(255,255,255,0.05);
            transition: all var(--transition-fast);
        }

        .episode-card:hover,
        .episode-card:focus {
            background: rgba(229,9,20,0.08);
            border-color: rgba(229,9,20,0.25);
            transform: translateX(4px);
        }

        .episode-thumb {
            width: 120px;
            height: 68px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            flex-shrink: 0;
            position: relative;
        }

        .episode-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .episode-thumb .ep-play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .episode-card:hover .ep-play-overlay { opacity: 1; }
        .ep-play-overlay span { font-size: 22px; }

        .ep-resume-badge {
            display: inline-flex;
            gap: 4px;
            background: rgba(255,202,40,0.12);
            border: 1px solid rgba(255,202,40,0.25);
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 9px;
            font-weight: 800;
            color: #ffca28;
            margin-top: 4px;
        }

        /* ========== PLAYER ========== */
        #playerModal { padding: 0 !important; background: #000 !important; backdrop-filter: none; }

        .player-modal-box {
            width: 100vw !important;
            max-width: 100vw !important;
            height: 100vh !important;
            height: 100dvh !important;
            max-height: 100vh !important;
            max-height: 100dvh !important;
            background: #000;
            border-radius: 0 !important;
            position: relative;
            border: none !important;
            margin: 0 !important;
            padding: 0 !important;
            overflow: hidden;
        }

        .player-modal-box.cursor-hidden { cursor: none; }
        .player-modal-box.cursor-hidden * { cursor: none !important; }

        .player-controls-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.96) 0%, rgba(0,0,0,0.4) 70%, transparent 100%);
            padding: 16px 20px 32px 20px;
            z-index: 50;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .player-controls-top > * { pointer-events: auto; }
        .player-controls-top.is-hidden { opacity: 0; }

        .player-back-btn,
        .player-btn-round {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            transition: all var(--transition-fast);
            backdrop-filter: blur(10px);
        }

        .player-back-btn:hover,
        .player-btn-round:hover,
        .player-back-btn:focus,
        .player-btn-round:focus {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: scale(1.1);
        }

        .player-title-area { flex: 1; min-width: 0; margin: 0 16px; }

        .player-title-main {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0,0,0,0.9);
        }

        .player-title-sub {
            font-size: 11px;
            color: #ccc;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .player-actions-right { display: flex; gap: 10px; }

        .player-container-view {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #000;
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        .player-container-view iframe {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
            display: block !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
            background: #000;
        }

        .player-container-view.stretch-mode iframe {
            transform: scale(1.2);
            transform-origin: center center;
        }

        .player-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 5;
            flex-direction: column;
            gap: 18px;
        }

        .player-loading.hidden { display: none; }

        .player-spinner {
            width: 56px;
            height: 56px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .player-tip-bottom {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(10px);
            color: #fff;
            padding: 10px 20px;
            border-radius: 24px;
            font-size: 12px;
            font-weight: 700;
            z-index: 60;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .player-tip-bottom.show { opacity: 1; }

        /* ========== AUDIO BOOSTER ========== */
        .player-bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.5) 60%, transparent 100%);
            padding: 30px 24px 20px 24px;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .player-controls-top:not(.is-hidden) ~ .player-bottom-bar {
            opacity: 1;
            pointer-events: auto;
        }

        .audio-boost-container {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 18px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .audio-boost-icon {
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .audio-boost-icon:hover { transform: scale(1.2); }

        .audio-boost-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 120px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.2);
            outline: none;
            cursor: pointer;
        }

        .audio-boost-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .audio-boost-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            border: 2px solid #fff;
        }

        .audio-boost-value {
            font-size: 13px;
            font-weight: 800;
            min-width: 45px;
            text-align: center;
            transition: color 0.2s;
        }

        /* ========== ADMIN ========== */
        .admin-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            transition: all var(--transition-fast);
        }

        .admin-item:hover { background: rgba(255,255,255,0.06); }

        /* ========== PROFILE ========== */
        .profile-card-header {
            position: relative;
            border-radius: var(--radius-md);
            background: #222;
            height: 150px;
            margin-bottom: 55px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .profile-banner-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile-avatar-overlay {
            position: absolute;
            bottom: -38px;
            left: 50%;
            transform: translateX(-50%);
            width: 84px;
            height: 84px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), #ff6b35);
            border: 4px solid var(--modal-bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 900;
            z-index: 2;
        }

        .profile-avatar-overlay img { width: 100%; height: 100%; object-fit: cover; }

        /* ========== SUGGESTIONS ========== */
        .suggestion-box {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 10px;
        }

        .sg-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .sg-user {
            font-size: 12px;
            font-weight: 800;
            color: var(--primary-color);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sg-email { font-size: 9px; color: #666; word-break: break-all; }
        .sg-date { font-size: 9px; color: #555; }

        .sg-text {
            font-size: 13px;
            color: #ddd;
            margin-top: 10px;
            line-height: 1.6;
            word-break: break-word;
        }

        .suggestion-checkbox {
            width: 20px;
            height: 20px;
            accent-color: var(--primary-color);
            cursor: pointer;
        }

        /* ========== STORAGE ========== */
        .storage-bar-outer {
            width: 100%;
            height: 16px;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .storage-bar-inner {
            height: 100%;
            border-radius: 8px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .storage-bar-inner::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            animation: storageShine 2s infinite;
        }

        @keyframes storageShine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .storage-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #888;
            margin-top: 8px;
            font-weight: 700;
        }

        .storage-detail-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 13px;
        }

        .storage-label { color: #888; }
        .storage-value { color: #fff; font-weight: 700; }

        .storage-icon-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: var(--radius-sm);
            padding: 16px;
            text-align: center;
            flex: 1;
        }

        .storage-icon-card .sto-icon { font-size: 28px; margin-bottom: 6px; display: block; }
        .storage-icon-card .sto-count { font-size: 22px; font-weight: 900; color: var(--primary-color); }
        .storage-icon-card .sto-label { font-size: 10px; color: #888; margin-top: 2px; }

        /* ========== CROPPER ========== */
        .device-preview-wrapper {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            margin-top: 14px;
        }

        .device-box {
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 6px;
            text-align: center;
            flex: 1;
        }

        .device-box label {
            font-size: 9px;
            font-weight: 800;
            color: #aaa;
            margin-bottom: 4px;
            display: block;
        }

        .device-screen {
            overflow: hidden;
            border: 1px solid #444;
            margin: 0 auto;
            background: #000;
        }

        .device-mobile { width: 45px; height: 75px; border-radius: 4px; }
        .device-pc { width: 90px; height: 55px; border-radius: 4px; }
        .device-tv { width: 110px; height: 60px; border-radius: 4px; border: 2px solid #555; }
        .device-screen img { width: 100%; height: 100%; object-fit: cover; }
        .cropper-container { max-width: 100% !important; height: 280px !important; }

        /* ========== AUTH ========== */
        .auth-modal-body {
            max-width: 420px;
            text-align: center;
            background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
        }

        .auth-divider {
            height: 1px;
            background: var(--border-color);
            margin: 20px 0;
        }

        /* ========== TOAST ========== */
        .hidden { display: none !important; }

        #msg {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 13px;
