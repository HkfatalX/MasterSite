<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MasterFlix - Filmes e Séries</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23141414'/%3E%3Cpath d='M20 78 L20 22 L35 22 L50 55 L65 22 L80 22 L80 78 L68 78 L68 42 L56 68 L44 68 L32 42 L32 78 Z' fill='%23e50914'/%3E%3C/svg%3E">
    <meta name="theme-color" content="#e50914">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --primary-color: #e50914;
            --primary-hover: #f40612;
            --primary-glow: rgba(229, 9, 20, 0.4);
            --bg-color: #0a0a0a;
            --bg-secondary: #141414;
            --card-bg: #1a1a1a;
            --modal-bg: #181818;
            --text-color: #ffffff;
            --text-muted: #999999;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            font-size: 14px;
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: linear-gradient(180deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }
        
        .menu-toggle-btn {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 4px;
            padding: 10px 9px;
        }

        .menu-toggle-btn .bar {
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        .brand {
            font-size: 20px;
            font-weight: 900;
            color: var(--primary-color);
            text-transform: uppercase;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .nav-actions { display: flex; align-items: center; gap: 12px; }

        .search-wrapper { position: relative; }
        .search-box {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.75);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            width: 40px;
            height: 38px;
            overflow: hidden;
            transition: width 0.3s ease;
        }

        .search-box.active { width: 220px; background: rgba(0,0,0,0.9); }

        .search-icon-btn {
            width: 38px;
            height: 38px;
            background: transparent;
            border: none;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 16px;
        }

        .search-input-field {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding-right: 10px;
            font-size: 13px;
            outline: none;
            opacity: 0;
            transition: opacity 0.2s ease 0.1s;
        }

        .search-box.active .search-input-field { opacity: 1; }

        .user-avatar-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .user-avatar-btn img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTAINER PRINCIPAL */
        .app-container { padding-top: 74px; padding-bottom: 40px; }

        .hero-banner {
            position: relative;
            width: 95%;
            max-width: 1400px;
            margin: 0 auto 30px auto;
            height: 50vh;
            min-height: 380px;
            max-height: 550px;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1a1a center/cover no-repeat;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(10,10,10,0.1) 0%, rgba(10,10,10,0.9) 100%);
        }

        .hero-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 24px;
            z-index: 2;
        }

        .hero-title { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
        .hero-desc { font-size: 13px; color: #ccc; max-width: 500px; margin-bottom: 16px; line-height: 1.5; }

        .btn-primary {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: var(--primary-color);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: var(--primary-hover); }

        /* SEÇÕES & CAROUSEL */
        .section-row { margin-bottom: 30px; padding-left: 2.5%; }
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 12px; }

        .carousel-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-right: 2.5%;
            scrollbar-width: none;
        }

        .media-card {
            flex: 0 0 140px;
            height: 210px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--card-bg);
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .media-card:hover { transform: scale(1.05); }
        .media-card img { width: 100%; height: 100%; object-fit: cover; }

        /* MODAIS GENERALIZADOS */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 16px;
        }

        .modal-body {
            background: var(--modal-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }

        /* PERFIL CORRIGIDO E RESPONSIVO */
        .profile-card-header {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
            height: 130px;
            margin-bottom: 45px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .profile-banner-bg { width: 100%; height: 100%; object-fit: cover; display: block; }

        .profile-avatar-overlay {
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--primary-color);
            border: 3px solid var(--modal-bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 800;
            z-index: 2;
        }

        .profile-avatar-overlay img { width: 100%; height: 100%; object-fit: cover; }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 11px; font-weight: 700; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #0f0f0f;
            color: #fff;
            font-size: 13px;
        }

        /* --- PLAYER DE VÍDEO CORRIGIDO --- */
        #playerModal { padding: 0; background: #000; }
        
        .player-modal-box {
            width: 100vw;
            height: 100vh;
            background: #000;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Barra superior de controles do player */
        .player-controls-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            padding: 16px 20px;
            z-index: 50;
            transition: opacity 0.3s ease;
            pointer-events: none; /* CLIQUES PASSAM DIRETO PARA O VÍDEO SE CLICAR FORA DOS BOTÕES */
        }

        .player-controls-top * { pointer-events: auto; } /* BOTÕES CONTINUAM CLICÁVEIS */

        .player-controls-top.is-hidden { opacity: 0; }
        .player-controls-top.is-hidden * { pointer-events: none !important; }

        .player-back-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-title-main { font-size: 14px; font-weight: 800; color: #fff; }
        .player-title-sub { font-size: 11px; color: #aaa; }

        .player-container-view {
            width: 100%;
            height: 100%;
            position: relative;
            flex: 1;
            background: #000;
        }

        .player-container-view iframe {
            width: 100% !important;
            height: 100% !important;
            border: none;
            display: block;
        }

        .player-loading {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            z-index: 5;
            flex-direction: column;
            gap: 12px;
        }

        .player-loading.hidden { display: none; }
        .player-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .episode-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .episode-thumb { width: 100px; height: 60px; border-radius: 4px; overflow: hidden; background: #000; flex-shrink: 0; }
        .episode-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header id="mainHeader">
        <div class="header-left">
            <button class="menu-toggle-btn" id="menuToggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
            <div class="brand">MasterFlix</div>
        </div>
        <div class="nav-actions">
            <div class="search-wrapper">
                <div class="search-box" id="searchBox">
                    <button class="search-icon-btn" id="searchBtn">🔍</button>
                    <input type="text" class="search-input-field" id="searchInput" placeholder="Buscar filmes, séries...">
                </div>
            </div>
            <div class="user-avatar-btn" id="profileBtn">
                <img id="headerAvatar" src="https://via.placeholder.com/150" alt="Avatar">
            </div>
        </div>
    </header>

    <main class="app-container">
        <section class="hero-banner" id="heroBanner">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1 class="hero-title" id="heroTitle">Título em Destaque</h1>
                <p class="hero-desc" id="heroDesc">Descrição do filme ou série em destaque na plataforma.</p>
                <button class="btn-primary" id="heroPlayBtn">▶ Assistir Agora</button>
            </div>
        </section>

        <section class="section-row">
            <h2 class="section-title">Em Alta</h2>
            <div class="carousel-container" id="mediaCarousel">
                </div>
        </section>
    </main>

    <div class="modal-overlay hidden" id="profileModal">
        <div class="modal-body">
            <button class="modal-close" onclick="closeModal('profileModal')">&times;</button>
            
            <div class="profile-card-header">
                <img class="profile-banner-bg" id="profileBanner" src="https://via.placeholder.com/600x200" alt="Banner">
                <div class="profile-avatar-overlay">
                    <img id="modalAvatar" src="https://via.placeholder.com/150" alt="Avatar">
                </div>
            </div>

            <form id="profileForm" style="margin-top: 10px;">
                <div class="input-group">
                    <label>Nome / Apelido</label>
                    <input type="text" id="profileNameInput" value="Hkfatal">
                </div>
                <div class="input-group">
                    <label>Biografia</label>
                    <input type="text" id="profileBioInput" value="Trabalhando no Site">
                </div>
                <div class="input-group">
                    <label>Gênero Favorito</label>
                    <select id="profileGenreInput">
                        <option value="Ação">Ação</option>
                        <option value="Aventura">Aventura</option>
                        <option value="Comédia">Comédia</option>
                        <option value="Drama">Drama</option>
                        <option value="Terror">Terror</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Salvar Perfil</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay hidden" id="playerModal">
        <div class="player-modal-box">
            <div class="player-controls-top" id="playerControlsTop">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <button class="player-back-btn" onclick="closePlayer()">&#8592;</button>
                    <div>
                        <div class="player-title-main" id="playerTitleDisplay">Título do Vídeo</div>
                        <div class="player-title-sub" id="playerSubDisplay">MasterFlix Player</div>
                    </div>
                </div>
            </div>
            
            <div class="player-container-view" id="playerContainerView">
                <div class="player-loading" id="playerLoading">
                    <div class="player-spinner"></div>
                    <span style="font-size: 12px; color: #aaa;">CARREGANDO VÍDEO...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
